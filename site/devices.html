<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apparaten - EnergieBuddy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="devices">


<header class="topbar">
  <div class="container topbar-inner">
    <a href="/dashboard.html" class="brand">EnergieBuddy</a>
    <nav class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/devices.html">Apparaten</a>
      <a href="/entries.html">Verbruik</a>
      <a href="/leaderboard.html">Leaderboard</a>
      <a href="/profile.html">Profiel</a>
      <button id="logout-button" class="linklike">Uitloggen</button>
    </nav>
  </div>
</header>

    <main class="container" style="padding:24px 0 48px">
      <div class="kicker">Apparaten</div>
      <h1>Mijn apparaten</h1>
      <p>Voeg apparaten toe per gebruiker. Alles wordt opgeslagen in MySQL.</p>
      <div class="grid cols-2">
        <section class="card pad">
          <h2>Nieuw apparaat</h2>
          <form id="device-form" class="form">
            <label>Naam<input name="name" required placeholder="Bijv. Airfryer" /></label>
            <label>Categorie<input name="category" required placeholder="Keuken" /></label>
            <label>Wattage<input type="number" name="wattage" min="0" placeholder="1500" /></label>
            <label>Uur per dag<input type="number" step="0.1" name="hoursPerDay" min="0" placeholder="1.5" /></label>
            <button class="btn success" type="submit">Apparaat opslaan</button>
          </form>
        </section>
        <section>
          <div id="device-list" class="grid"></div>
        </section>
      </div>
    </main>

<div id="chat-toggle" class="chat-toggle">🤖</div>
<div id="chat-box" class="chat-box">
  <div class="chat-head">EnergieBuddy AI</div>
  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-input-wrap">
    <input id="chat-input" placeholder="Stel een vraag..." />
    <button id="chat-send" class="btn">Verstuur</button>
  </div>
</div>



<script type="module" src="/js/layout.js"></script>
<script type="module" src="/js/chatbot.js"></script>
<script type="module" src="/js/devices.js"></script>
</body>
</html>
